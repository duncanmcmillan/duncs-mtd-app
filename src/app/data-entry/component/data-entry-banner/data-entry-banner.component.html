@if (activeMethod()) {
  <div class="de-banner" role="status" aria-live="polite">
    <!-- Method icon + label -->
    <div class="de-banner-left">
      <svg class="de-banner-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <span class="de-banner-label">{{ activeLabel() }}</span>
      @if (activeDetail()) {
        <span class="de-banner-detail">{{ activeDetail() }}</span>
      }
    </div>

    <!-- Refresh action -->
    <button
      class="de-banner-refresh"
      type="button"
      aria-label="Refresh figures from source"
      (click)="refreshClick.emit()"
    >
      Refresh from source
    </button>
  </div>
}
