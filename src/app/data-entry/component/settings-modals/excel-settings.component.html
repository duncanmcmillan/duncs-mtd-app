<div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="excel-modal-title">
  <div class="modal">
    <header class="modal__header">
      <h2 class="modal__title" id="excel-modal-title">Local Excel Settings</h2>
      <button type="button" class="modal__close" aria-label="Close Excel settings" (click)="onCancel()">&#x2715;</button>
    </header>

    <div class="modal__fields">
      <mat-form-field appearance="outline">
        <mat-label>File Path</mat-label>
        <input
          matInput
          [value]="form().filePath"
          (input)="setField('filePath', $any($event.target).value)"
          autocomplete="off"
          placeholder="/Users/you/income.xlsx"
          aria-required="true"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Sheet Name</mat-label>
        <input
          matInput
          [value]="form().sheetName"
          (input)="setField('sheetName', $any($event.target).value)"
          autocomplete="off"
          placeholder="Sheet1"
          aria-required="true"
        />
      </mat-form-field>
    </div>

    @if (store.hasError()) {
      <p class="modal__error" role="alert" aria-live="polite">{{ store.error() }}</p>
    }

    <div class="modal__actions">
      <button type="button" mat-button (click)="onCancel()">Cancel</button>
      <button
        type="button"
        mat-flat-button
        color="primary"
        [disabled]="store.isLoading()"
        (click)="onSubmit()"
      >
        {{ store.isLoading() ? 'Saving…' : 'Save' }}
      </button>
    </div>
  </div>
</div>
