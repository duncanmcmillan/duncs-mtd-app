<div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="airtable-modal-title">
  <div class="modal">
    <header class="modal__header">
      <h2 class="modal__title" id="airtable-modal-title">AirTable Settings</h2>
      <button type="button" class="modal__close" aria-label="Close AirTable settings" (click)="onCancel()">&#x2715;</button>
    </header>

    <div class="modal__fields">
      <mat-form-field appearance="outline">
        <mat-label>API Key</mat-label>
        <input
          matInput
          type="password"
          [value]="form().apiKey"
          (input)="setField('apiKey', $any($event.target).value)"
          autocomplete="off"
          aria-required="true"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Base ID</mat-label>
        <input
          matInput
          [value]="form().baseId"
          (input)="setField('baseId', $any($event.target).value)"
          autocomplete="off"
          placeholder="appXXXXXXXXXXXXXX"
          aria-required="true"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Date Column</mat-label>
        <input
          matInput
          [value]="form().dateColumn"
          (input)="setField('dateColumn', $any($event.target).value)"
          autocomplete="off"
          placeholder="Quarter End Date"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Self Employment Table</mat-label>
        <input
          matInput
          [value]="form().selfEmploymentTable ?? ''"
          (input)="setField('selfEmploymentTable', $any($event.target).value)"
          autocomplete="off"
          placeholder="Self Employment"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>UK Property Table</mat-label>
        <input
          matInput
          [value]="form().ukPropertyTable ?? ''"
          (input)="setField('ukPropertyTable', $any($event.target).value)"
          autocomplete="off"
          placeholder="UK Property"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Foreign Property Table</mat-label>
        <input
          matInput
          [value]="form().foreignPropertyTable ?? ''"
          (input)="setField('foreignPropertyTable', $any($event.target).value)"
          autocomplete="off"
          placeholder="Foreign Property"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Claude API Key (for auto-mapping)</mat-label>
        <input
          matInput
          type="password"
          [value]="claudeKeyForm()"
          (input)="claudeKeyForm.set($any($event.target).value)"
          autocomplete="off"
          placeholder="sk-ant-…"
        />
      </mat-form-field>
    </div>

    @if (claudeKeyForm()) {
      <div class="modal__automap">
        <button
          type="button"
          mat-stroked-button
          [disabled]="autoMapping()"
          (click)="onAutoMap()"
          aria-label="Auto-map columns to MTD fields using Claude"
        >
          {{ autoMapping() ? 'Mapping…' : 'Auto-map with Claude' }}
        </button>
        @if (autoMapError()) {
          <p class="modal__error" role="alert" aria-live="polite">{{ autoMapError() }}</p>
        }
      </div>
    }

    @if (store.hasError()) {
      <p class="modal__error" role="alert" aria-live="polite">{{ store.error() }}</p>
    }

    <div class="modal__actions">
      <button type="button" mat-button (click)="onCancel()">Cancel</button>
      <button
        type="button"
        mat-flat-button
        color="primary"
        [disabled]="store.isLoading()"
        (click)="onSubmit()"
      >
        {{ store.isLoading() ? 'Saving…' : 'Save' }}
      </button>
    </div>
  </div>
</div>
