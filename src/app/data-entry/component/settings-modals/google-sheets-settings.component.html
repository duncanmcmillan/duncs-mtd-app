<div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="google-sheets-modal-title">
  <div class="modal">
    <header class="modal__header">
      <h2 class="modal__title" id="google-sheets-modal-title">Google Sheets Settings</h2>
      <button type="button" class="modal__close" aria-label="Close Google Sheets settings" (click)="onCancel()">&#x2715;</button>
    </header>

    <div class="modal__body">
    <div class="modal__fields">
      <mat-form-field appearance="outline">
        <mat-label>Spreadsheet ID</mat-label>
        <input
          matInput
          [value]="form().spreadsheetId"
          (input)="setField('spreadsheetId', $any($event.target).value)"
          autocomplete="off"
          placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"
          aria-required="true"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>API Key</mat-label>
        <input
          matInput
          type="password"
          [value]="form().apiKey"
          (input)="setField('apiKey', $any($event.target).value)"
          autocomplete="off"
          aria-required="true"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Date Column</mat-label>
        <input
          matInput
          [value]="form().dateColumn"
          (input)="setField('dateColumn', $any($event.target).value)"
          autocomplete="off"
          placeholder="Quarter End Date"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Self Employment Sheet</mat-label>
        <input
          matInput
          [value]="form().selfEmploymentSheet ?? ''"
          (input)="setField('selfEmploymentSheet', $any($event.target).value)"
          autocomplete="off"
          placeholder="SE-2024"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>UK Property Sheet</mat-label>
        <input
          matInput
          [value]="form().ukPropertySheet ?? ''"
          (input)="setField('ukPropertySheet', $any($event.target).value)"
          autocomplete="off"
          placeholder="UKP-2024"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Foreign Property Sheet</mat-label>
        <input
          matInput
          [value]="form().foreignPropertySheet ?? ''"
          (input)="setField('foreignPropertySheet', $any($event.target).value)"
          autocomplete="off"
          placeholder="FORP-2024"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Claude API Key (for auto-mapping)</mat-label>
        <input
          matInput
          type="password"
          [value]="claudeKeyForm()"
          (input)="claudeKeyForm.set($any($event.target).value)"
          autocomplete="off"
          placeholder="sk-ant-…"
        />
      </mat-form-field>
    </div>

    @if (claudeKeyForm()) {
      <div class="modal__automap">
        <button
          type="button"
          class="btn btn--outline"
          [disabled]="autoMapping()"
          (click)="onAutoMap()"
          aria-label="Auto-map columns to MTD fields using Claude"
        >
          {{ autoMapping() ? 'Mapping…' : 'Auto-map with Claude' }}
        </button>
        @if (autoMapError()) {
          <p class="modal__error" role="alert" aria-live="polite">{{ autoMapError() }}</p>
        }
      </div>
    }

    @if (store.hasError()) {
      <p class="modal__error" role="alert" aria-live="polite">{{ store.error() }}</p>
    }
    </div>

    <div class="modal__footer">
      <button type="button" class="btn btn--ghost" (click)="onCancel()">Cancel</button>
      <button
        type="button"
        class="btn btn--primary"
        [disabled]="store.isLoading()"
        (click)="onSubmit()"
      >
        {{ store.isLoading() ? 'Saving…' : 'Save' }}
      </button>
    </div>
  </div>
</div>
